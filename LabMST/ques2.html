<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="text">Lorem ipsum dolor sit amet consectetur adipisicing elit. Quas eos esse assumenda at asperiores eum, laborum voluptatum sequi, itaque distinctio ad eligendi obcaecati expedita? Facere nam sed deleniti nostrum fugiat.</p>
    <button id="btn">Click</button>
    <script>
        document.getElementById("btn").addEventListener("click", function(){
            document.getElementById("text").innerText="Welcome to JavaScript DOM Manipulation";
            document.getElementById("text").style.color="blue";
        })
    </script>
</body>
</html>
